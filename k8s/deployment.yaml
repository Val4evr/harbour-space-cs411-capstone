# k8s translation of the homework's systemd unit:
#   Restart=on-failure -> restartPolicy(Always) + livenessProbe
#   readinessProbe gates Service traffic until the app actually serves.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  labels:
    app: myapp
spec:
  replicas: 1
  # hostPort means only one pod can bind :4444 per node — RollingUpdate would
  # deadlock (new pod Pending while old pod owns the port). Recreate kills the
  # old pod first.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: ttl.sh/val4evr-myapp:24h
          # ttl.sh tags are transient; once pulled, keep the local image rather
          # than failing when the registry copy expires.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4444
              # hostPort so the app answers on kubernetes:4444 directly (the
              # exam check curls the machines on :4444); single node + single
              # replica makes this safe.
              hostPort: 4444
          livenessProbe:
            httpGet:
              path: /
              port: 4444
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 4444
            initialDelaySeconds: 2
            periodSeconds: 5
