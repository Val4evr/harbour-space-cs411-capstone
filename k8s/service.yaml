# NodePort Service — the in-cluster/Service-routed path (the stretch's
# "reachable through the Service"); the hostPort on the pod additionally
# exposes plain :4444 for the exam's per-machine check.
apiVersion: v1
kind: Service
metadata:
  name: capstone
spec:
  type: NodePort
  selector:
    app: capstone
  ports:
    - port: 4444
      targetPort: 4444
      nodePort: 30444
