# NodePort so the app is reachable from outside the cluster on <node-ip>:30444 —
# the k8s equivalent of `docker run -p 4444:4444` from the docker challenge.
apiVersion: v1
kind: Service
metadata:
  name: capstone
spec:
  type: NodePort
  selector:
    app: capstone
  ports:
    - port: 4444
      targetPort: 4444
      nodePort: 30444
